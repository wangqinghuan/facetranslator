<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0099cc"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b2cbf"/>
      <stop offset="100%" style="stop-color:#5a189a"/>
    </linearGradient>
  </defs>
  
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <g transform="translate(256, 256)">
    <!-- Top bubble (Chinese - cyan) -->
    <g transform="translate(0, -70)">
      <path d="M-80 -60 L80 -60 L80 40 C80 70 50 90 0 90 C-50 90 -80 70 -80 40 Z" 
            fill="url(#cyan)" opacity="0.9"/>
      <path d="M-40 10 L0 30 L40 10" 
            stroke="#1a1a2e" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- Divider -->
    <rect x="-100" y="-8" width="200" height="16" rx="8" fill="url(#cyan)" opacity="0.6"/>
    <rect x="-100" y="-8" width="200" height="16" rx="8" fill="url(#purple)" opacity="0.6"/>
    <text x="0" y="6" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">⟷</text>
    
    <!-- Bottom bubble (English - purple) -->
    <g transform="translate(0, 70) rotate(180)">
      <path d="M-80 -60 L80 -60 L80 40 C80 70 50 90 0 90 C-50 90 -80 70 -80 40 Z" 
            fill="url(#purple)" opacity="0.9"/>
      <path d="M-40 10 L0 30 L40 10" 
            stroke="#fff" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  
  <!-- Mic icon overlay -->
  <circle cx="256" cy="256" r="50" fill="#0a0a0f" stroke="url(#cyan)" stroke-width="4"/>
  <path d="M256 220 C248 220 242 226 242 234 L242 258 C242 266 248 272 256 272 C264 272 270 266 270 258 L270 234 C270 226 264 220 256 220 Z" fill="#fff"/>
  <rect x="250" y="278" width="12" height="16" rx="6" fill="#fff"/>
  <rect x="244" y="290" width="24" height="4" rx="2" fill="#fff"/>
</svg>
