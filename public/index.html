<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FaceTranslator - 面对面翻译器</title>
    <meta name="description" content="Real-time voice translator for face-to-face conversations between Chinese and English speakers. Tap, speak, and see instant translations.">
    <meta name="keywords" content="translator, voice translator, Chinese, English, translation, speech recognition, face to face, 语言翻译, 语音翻译">
    <meta name="author" content="FaceTranslator">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="FaceTranslator - 面对面翻译器">
    <meta property="og:description" content="Real-time voice translator for face-to-face conversations between Chinese and English speakers.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://facetranslator.vercel.app">
    <meta property="og:image" content="https://facetranslator.vercel.app/logo.svg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="FaceTranslator - 面对面翻译器">
    <meta name="twitter:description" content="Real-time voice translator for face-to-face conversations.">
    <link rel="canonical" href="https://facetranslator.vercel.app">
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="google-site-verification" content="Kd_pHZRg2BjECIm4Wcp2h7z43A_WI1FYMWSwDGhQVrs" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-1NQQ948PWB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-1NQQ948PWB');
    </script>
</head>
<body>
    <div class="container">
        <!-- 上半部分：中文区（给外国人看） -->
        <div class="language-section chinese-section">
            <div class="label">中文</div>
            <div class="text-display" id="chinese-text">
                <span class="placeholder">点击麦克风说话...</span>
            </div>
            <div class="controls">
                <button class="mic-btn" id="chinese-mic" data-lang="zh-CN">
                    <svg viewBox="0 0 24 24" width="32" height="32">
                        <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
                <div class="status" id="chinese-status"></div>
            </div>
        </div>

        <!-- 分割线 -->
        <div class="divider">
            <div class="divider-line"></div>
        </div>

        <!-- 下半部分：英文区（给中国人看） -->
        <div class="language-section english-section">
            <div class="label">English</div>
            <div class="text-display" id="english-text">
                <span class="placeholder">Tap microphone to speak...</span>
            </div>
            <div class="controls">
                <button class="mic-btn" id="english-mic" data-lang="en-US">
                    <svg viewBox="0 0 24 24" width="32" height="32">
                        <path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                    </svg>
                </button>
                <div class="status" id="english-status"></div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
